<!DOCTYPE html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Blog</title>
    <meta name="description" content="마크다운으로 쓰는 네온 블로그" />
    <link rel="stylesheet" href="css/style.css" />
    <!-- 최초 페인트 전에 테마를 적용해 깜빡임을 방지한다. 기본은 다크(네온). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="container container--wide site-header__inner">
        <a class="site-header__brand" href="index.html">My Blog</a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="테마 전환"></button>
      </div>
    </header>

    <main class="container container--wide site-main">
      <section class="hero">
        <p class="hero__eyebrow">// hello, world</p>
        <h1 class="hero__title">MY <span>BLOG</span></h1>
        <p class="hero__subtitle">마크다운으로 기록하는 작은 노트들. 코드, 디자인, 그리고 그 사이의 모든 것.</p>
      </section>

      <div class="post-list" data-post-list>
        <p class="loading">글을 불러오는 중…</p>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container container--wide">
        <p>© 2026 My Blog — built with markdown</p>
      </div>
    </footer>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
